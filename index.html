<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Judge Scott Gardner</title>
  <meta name="description" content="Thank you to everyone who participated, volunteered, and supported the campaign." />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta property="og:title" content="Judge Scott Gardner" />
  <meta property="og:description" content="Thank you to everyone who participated, volunteered, and supported the campaign." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://judgescottgardner.com/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Judge Scott Gardner" />
  <meta name="twitter:description" content="Thank you to everyone who participated, volunteered, and supported the campaign." />
  <style>
    :root {
      --page: #ebe6d8;
      --ink: #19334d;
      --muted: #52677a;
      --rule: #d6cebc;
      --accent: #a71c1c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      background: var(--page);
      color: var(--muted);
      font-family: Arial, Helvetica, sans-serif;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    main {
      width: min(760px, calc(100% - 2rem));
      align-self: center;
      justify-self: center;
      padding: 1rem 0;
    }

    .notice {
      border-top: 6px solid var(--accent);
      padding-top: clamp(1.5rem, 4vw, 2.5rem);
    }

    p {
      margin: 0;
      max-width: 58ch;
      font-size: clamp(1.125rem, 2.2vw, 1.35rem);
      line-height: 1.5;
    }

    footer {
      border-top: 1px solid var(--rule);
      width: 100%;
      padding: 1rem;
      color: #647486;
      font-size: 0.82rem;
      line-height: 1.4;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <section class="notice" aria-label="Campaign message">
      <p>Thank you to everyone who participated, volunteered, and supported the campaign.</p>
    </section>
  </main>
  <footer>Paid for by the Committee To Elect Judge Scott Gardner</footer>
</body>
</html>
